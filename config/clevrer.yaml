# SlotPi 正式训练配置 — CLEVRER
dataset: "clevrer"
data_root: "./data/clevrer"
num_workers: 4

pretrain: false

# 编码器
encoder_type: "cnn"
in_channels: 3
img_size: 128
encoder_hidden: 64

# Slot Attention
num_slots: 7
static_dim: 96
dynamic_dim: 32
slot_hidden: 128

# 解码器
decoder_hidden: [64, 64, 64, 64]
broadcast_size: [8, 8]

# 物理模块
hidden_dim: 256
num_heads: 4
qkv_size: 128
mlp_size: 256
num_layers: 2
h_layers: 1
out_mlp: false
out_hidden_layers: 1
pre_norm: false
dropout_rate: 0.1
delta_t: 0.125
integrator_method: "Euler"
num_spatiotemporal_blocks: 2

# 训练（每 32 batchsize 需 10 GB 左右显存）
num_steps: 200000
batch_size: 64
learning_rate: 0.0002
weight_decay: 0.0
max_grad_norm: 2.5
burnin_frames: 6
rollout_frames: 6

warmup_steps: 5000

# 损失权重
lambda_slots: 0.5
lambda_images: 0.0
lambda_energy: 0.10
lambda_static: 0.1
lambda_rev: 0.005
lambda_recon_burnin: 0.0
lambda_recon_rollout: 2.0
gamma_max: 0.0
c_gamma: 10.0
rev_mlp_hidden: 128

# GRL 反向传播梯度裁剪
rev_grad_max_norm: 0.05

# 日志与存档
log_every: 10
eval_every_epochs: 5
save_every: 1000
keep_last_checkpoints: 10
workdir: "./experiments/clevrer"

# 断点续训
resume: false
resume_step: 0

# 梯度分量裁剪，为 0 表示不开启，非特殊情况下不需要开启：
max_encoder_gnorm: 0.0
max_decoder_gnorm: 0.0
max_slot_attention_gnorm: 0.0

# 冻结 STATM-SAVi（finetune 阶段启用）
freeze_slot: True

# 预训练权重路径（finetune 时加载 encoder + slot_attention + decoder，预测模块变化不影响加载）
pretrained_path: "./pretrained/clevrer/checkpoints/best.pt"