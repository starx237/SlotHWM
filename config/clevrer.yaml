# SlotPi 端到端训练配置 — CLEVRER
dataset: "clevrer"
data_root: "./data/clevrer"
num_workers: 4




# 编码器
encoder_type: "cnn"
in_channels: 3
img_size: 128
encoder_hidden: 64

# Slot Attention
num_slots: 7
static_dim: 96
dynamic_dim: 32
slot_hidden: 128
slot_iters: 4

# 解码器
decoder_hidden: [64, 64, 64, 64]
broadcast_size: [32, 32]

# 物理模块
hidden_dim: 256
num_heads: 4
qkv_size: 128
mlp_size: 256
num_layers: 2
h_layers: 1
out_mlp: false
out_hidden_layers: 1
pre_norm: false
dropout_rate: 0.1
delta_t: 0.125
integrator_method: "Euler"
num_spatiotemporal_blocks: 2

# 训练
num_steps: 500000
batch_size: 64
learning_rate: 0.0002
weight_decay: 0.0
max_grad_norm: 2.0
burnin_frames: 4
rollout_frames: 4

# 学习率调度（warmup + cosine decay）
warmup_steps: 3000

# 损失权重
lambda_slots: 0.01
lambda_images: 0.0
lambda_energy: 0.01
lambda_static: 0.02
lambda_rev: 0.05
lambda_recon_burnin: 15.0
lambda_recon_rollout: 5.0
gamma_max: 0.0
c_gamma: 10.0
rev_mlp_hidden: 128

# GRL 反向传播梯度裁剪
rev_grad_max_norm: 2.0

# 日志与存档
log_every: 10
save_every: 5000
keep_last_checkpoints: 3
workdir: "./experiments/clevrer"
