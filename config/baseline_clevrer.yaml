# Baseline 训练配置
dataset: "clevrer"
data_root: "./data/clevrer"
num_workers: 4

pretrain: false
freeze_slot: true

# 编码器
encoder_type: "cnn"
in_channels: 3
img_size: 128
encoder_hidden: 64

# Slot Attention
num_slots: 7
static_dim: 96
dynamic_dim: 32
slot_hidden: 128

# 解码器
decoder_hidden: [64, 64, 64, 64]
broadcast_size: [8, 8]

# 预测器
hidden_dim: 256
num_heads: 4
qkv_size: 128
mlp_size: 256
num_layers: 2
pre_norm: false
dropout_rate: 0.1

# 训练
num_steps: 200000
batch_size: 64
learning_rate: 0.0002
weight_decay: 0.0
max_grad_norm: 2.5
burnin_frames: 6
rollout_frames: 6
buffer_len: 12

warmup_steps: 5000

# 损失权重
lambda_slots: 0.5
lambda_images: 0.0
lambda_recon_burnin: 0.0
lambda_recon_rollout: 2.0
lambda_energy: 0.0
lambda_static: 0.0

# 日志与存档
log_every: 10
eval_every_epochs: 2
save_every: 1000
keep_last_checkpoints: 10
workdir: "./experiments/baseline_clevrer"

# 断点续训
resume: true
resume_step: 1000

# 预训练权重路径（可加载 STATM-SAVi 初始化）
pretrained_path: "./pretrained/clevrer/checkpoints/best.pt"
