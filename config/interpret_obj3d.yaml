# SlotPi 可解释性测试配置 — OBJ3D（C 交换实验）
# 基于 obj3d.yaml，移除了训练专有参数，适用于 interpret_swap_c.py
dataset: "obj3d"
data_root: "./data/obj3d"
num_workers: 0

pretrain: false

# 时域降采样（原始 25fps → 12.5fps）
subsample: 2

# 编码器
encoder_type: "cnn"
in_channels: 3
img_size: 64
encoder_hidden: 64

# Slot Attention
num_slots: 7
static_dim: 112
dynamic_dim: 16
slot_hidden: 128

# 解码器
decoder_hidden: [64, 64, 64, 64]
broadcast_size: [8, 8]

# 物理模块
hidden_dim: 256
num_heads: 4
qkv_size: 128
mlp_size: 256
num_layers: 2
h_layers: 1
out_mlp: false
out_hidden_layers: 1
pre_norm: false
dropout_rate: 0.1
delta_t: 0.08
integrator_method: "Euler"
num_spatiotemporal_blocks: 2

# 推理帧数
burnin_frames: 1
rollout_frames: 1

# C 冻结模式（必须与 checkpoint 训练时一致）
freeze_C: true

workdir: "./experiments/interpret_obj3d"
