# SlotPi ISA C-Swap 可解释性测试配置 — OBJ3D
dataset: "obj3d"
data_root: "./data/obj3d"
num_workers: 0

pretrain: false

subsample: 2

# 编码器
encoder_type: "cnn"
in_channels: 3
img_size: 64
encoder_hidden: 64
feat_dim: 64

# ISA Slot Attention
num_slots: 6
appearance_dim: 64
slot_hidden: 67
qkv_size: 64
slot_iters: 3
sa_mlp_size: 128
grid_enc_hidden: 128
scales_factor: 5.0
add_rel_pos_to_values: true
softmax_temperature: 1.0
append_statistics: false

# Z 空间拆分
static_dim: 34
dynamic_dim: 33

# 解码器（ISA 单流）
decoder_hidden: 64
broadcast_size: 16

# 物理模块
hidden_dim: 256
num_heads: 4
qkv_size: 128
mlp_size: 256
num_layers: 2
h_layers: 1
out_mlp: false
out_hidden_layers: 1
pre_norm: false
dropout_rate: 0.1
delta_t: 0.08
integrator_method: "Euler"
num_spatiotemporal_blocks: 2

# 推理帧数
burnin_frames: 6
rollout_frames: 10

# C 冻结模式（必须与 checkpoint 训练时一致）
freeze_C: true

workdir: "./experiments/interpret_obj3d"
